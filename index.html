<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="12-Rock-Paper-Scissors.css" />
  </head>
  <body>
    <div class="center">
      <h1>Rock Paper Scissors</h1>
      <div class="btn-div">
        <button class="move-button js-rock-button">
          <img src="Images/Rock-emoji.png" class="move-icon" alt="Rock" />
        </button>

        <button class="move-button js-paper-button">
          <img src="Images/Paper-emoji.png" class="move-icon" alt="Paper" />
        </button>

        <button class="move-button js-scissors-button">
          <img
            src="Images/Scissors-emoji.png"
            class="move-icon"
            alt="Scissors"
          />
        </button>
      </div>

      <p class="js-result result"></p>
      <p class="js-moves"></p>
      <p class="js-score score"></p>

      <button
        class="reset-btn"
        onclick="
          score.wins = 0;
          score.losses = 0;
          score.ties = 0;
          localStorage.removeItem('Score');
          updateScoreElement();
        "
      >
        Reset Score
      </button>

      <button class="js-auto-play-btn auto-play-btn" onclick="autoplay()">
        Auto Play
      </button>
    </div>

    <script src="12-Rock-Paper-Scissors.js"></script>
  </body>
</html>
